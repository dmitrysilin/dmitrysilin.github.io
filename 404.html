      var theme = "dark";

      var accessibility = "off";

        var savedTheme = window.localStorage.getItem("site-theme");
        var savedAccessibility = window.localStorage.getItem("site-accessibility");

        if (savedTheme === "light" || savedTheme === "dark") {
          theme = savedTheme;
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          theme = "light";
        }

        if (savedAccessibility === "on" || savedAccessibility === "off") {
          accessibility = savedAccessibility;
        } else if (
          window.matchMedia &&
          (
            window.matchMedia("(prefers-contrast: more)").matches ||
            window.matchMedia("(forced-colors: active)").matches
          )
        ) {
          accessibility = "on";
        }
      } catch (error) {}

      if (theme === "light") {
        themeColor = "#f7f2ea";
      }

      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-accessibility", accessibility);
      document.querySelector('meta[name="theme-color"]').setAttribute("content", themeColor);
    })();
  </script>
